<!-- @dsCard group="Pickers" viewport="420x420" name="ColorPicker" subtitle="pick one color from a swatch grid (built on GridPicker)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  #root { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .lbl { font-size: var(--text-xs); color: var(--muted-foreground); margin-bottom: 8px; }
  .frame { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--popover); padding: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const S = window.TestDesignSystem_be7089;
const { ColorPicker } = S;
function Demo() {
  const [c, setC] = React.useState("#8b93a6");
  return (
    <>
      <div>
        <div className="lbl">Default palette · selected {c}</div>
        <div className="frame"><ColorPicker value={c} onChange={setC} /></div>
      </div>
      <div>
        <div className="lbl">Categorized (groups) · larger swatches</div>
        <div className="frame" style={{ width: 280 }}>
          <ColorPicker
            defaultValue="#2fa84f"
            swatchSize={30}
            groups={[
              { id: "warm", label: "Warm", items: ["#e42222","#e0347f","#f5921b","#f5c518","#d2601a"].map((v) => ({ value: v })) },
              { id: "cool", label: "Cool", items: ["#2fa84f","#12a594","#17b0e8","#1f6fd6","#4d5ae5","#9b32d4"].map((v) => ({ value: v })) },
            ]}
            categories="none"
          />
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
