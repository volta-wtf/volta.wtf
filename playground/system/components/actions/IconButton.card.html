<!-- @dsCard group="Actions" viewport="720x420" name="Icon Button" subtitle="icon + label — left, right, top, bottom, none" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .lbl { font-size: 12px; color: var(--muted-foreground); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  section { margin-bottom: 32px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { IconButton } = window.TestDesignSystem_be7089;

function App(){
  return (
    <div style={{ maxWidth: 620 }}>
      <section>
        <div className="lbl">Toolbar — ghost (default)</div>
        <div className="row" style={{ gap: 32 }}>
          <IconButton icon="inbox" aria-label="Archive" />
          <IconButton icon="star" aria-label="Star" />
          <IconButton icon="more-vertical" aria-label="More" />
          <IconButton icon="send" aria-label="Send" />
          <IconButton icon="delete" aria-label="Delete" />
        </div>
      </section>
      <section>
        <div className="lbl">Variants</div>
        <div className="row" style={{ gap: 32 }}>
          <IconButton icon="star" aria-label="Ghost" />
          <IconButton icon="star" variant="surface" aria-label="Surface" />
          <IconButton icon="star" variant="solid" aria-label="Solid" />
          <IconButton icon="star" readOnly aria-label="Read-only" />
          <IconButton icon="star" disabled aria-label="Disabled" />
        </div>
      </section>
      <section style={{ marginBottom: 0 }}>
        <div className="lbl">Sizes</div>
        <div className="row" style={{ gap: 32 }}>
          <IconButton icon="add" size="sm" variant="surface" aria-label="Small" />
          <IconButton icon="add" size="md" variant="surface" aria-label="Medium" />
          <IconButton icon="add" size="lg" variant="surface" aria-label="Large" />
        </div>
      </section>
      <section style={{ marginTop: 40, marginBottom: 0 }}>
        <div className="lbl">Context label — top, bottom, left, right (plain text)</div>
        <div className="row" style={{ gap: 56, paddingTop: 20, paddingBottom: 20 }}>
          <IconButton icon="star" label="Top" labelPosition="top" />
          <IconButton icon="star" label="Bottom" labelPosition="bottom" />
          <IconButton icon="star" label="Left" labelPosition="left" />
          <IconButton icon="star" label="Right" labelPosition="right" />
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
