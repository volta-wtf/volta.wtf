<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .lbl { font-size: 12px; color: var(--muted-foreground); margin-bottom: 12px; }
  .surface { position: relative; height: 380px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: color-mix(in oklch, var(--muted) 50%, transparent); }
  .anchor { position: absolute; right: 20px; bottom: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { FloatingMenu, Icon } = window.TestDesignSystem_be7089;

const ACTIONS = [
  { icon: "image", label: "Photo" },
  { icon: "gallery", label: "Gallery" },
  { icon: "file", label: "Document" },
];

function App(){
  return (
    <div style={{ maxWidth: 620 }}>
      <div className="lbl">Two background options — label chip vs circular backdrop behind the icon.</div>
      <div style={{ display: "flex", gap: 20 }}>
        <div className="surface" style={{ flex: 1 }}>
          <div className="anchor"><FloatingMenu icon="edit" actions={ACTIONS} background="label" /></div>
        </div>
        <div className="surface" style={{ flex: 1 }}>
          <div className="anchor"><FloatingMenu icon="edit" actions={ACTIONS} background="icon" /></div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
