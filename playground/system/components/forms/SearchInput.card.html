<!-- @dsCard group="Forms" viewport="640x360" name="Search Input" subtitle="search field with leading icon and a clear (✕) button" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  #root { display: flex; }
  .lbl { font-size: var(--text-xs); color: var(--muted-foreground); margin-bottom: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const S = window.TestDesignSystem_be7089;
const { SearchInput } = S;
const Col = ({ children, style }) => <div style={{ display: "flex", flexDirection: "column", gap: 20, maxWidth: 320, ...style }}>{children}</div>;
function Demo() {
  const [q, setQ] = React.useState("Design tokens");
  return (
    <Col>
      <div>
        <div className="lbl">Default · type to reveal the clear button</div>
        <SearchInput defaultValue="Buttons" placeholder="Search components…" />
      </div>
      <div>
        <div className="lbl">Empty</div>
        <SearchInput placeholder="Search…" />
      </div>
      <div>
        <div className="lbl">Controlled · value: “{q || "—"}”</div>
        <SearchInput value={q} onChange={setQ} placeholder="Search…" />
      </div>
      <div>
        <div className="lbl">Small &amp; large</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <SearchInput size="sm" defaultValue="sm" placeholder="Small" />
          <SearchInput size="lg" defaultValue="lg" placeholder="Large" />
        </div>
      </div>
      <div>
        <div className="lbl">Disabled</div>
        <SearchInput disabled defaultValue="Locked" />
      </div>
    </Col>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
