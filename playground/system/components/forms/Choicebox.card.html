<!-- @dsCard group="Forms" viewport="820x820" name="Choicebox" subtitle="selectable card option — radio, checkbox or switch" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .wrap { max-width: 620px; display: flex; flex-direction: column; gap: 28px; }
  .lbl { font-size: 12px; font-weight: 600; color: var(--muted-foreground); margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Choicebox, ChoiceboxGroup } = window.TestDesignSystem_be7089;
function App(){
  const [plan, setPlan] = React.useState("pro");
  return (
    <div className="wrap">
      <div>
        <div className="lbl">Single select (radio)</div>
        <ChoiceboxGroup value={plan} onValueChange={setPlan}>
          <Choicebox value="hobby" title="Hobby" description="For personal projects and experiments." />
          <Choicebox value="pro" title="Pro" description="For professional developers and teams." />
          <Choicebox value="enterprise" title="Enterprise" description="Advanced controls and support." disabled />
        </ChoiceboxGroup>
      </div>
      <div>
        <div className="lbl">Multiple select (checkbox)</div>
        <ChoiceboxGroup type="checkbox" defaultValue={["analytics"]}>
          <Choicebox value="analytics" icon="chart-bar" title="Web Analytics" description="Privacy-friendly traffic insights." />
          <Choicebox value="speed" icon="trend-up" title="Speed Insights" description="Real-world performance metrics." />
        </ChoiceboxGroup>
      </div>
      <div>
        <div className="lbl">Toggle (switch)</div>
        <ChoiceboxGroup type="switch" defaultValue={["firewall"]}>
          <Choicebox value="firewall" icon="shield" title="Firewall" description="Block malicious traffic automatically." />
          <Choicebox value="logs" icon="file" title="Audit Logs" description="Record every access event." />
        </ChoiceboxGroup>
      </div>
      <div>
        <div className="lbl">Multiple select (checkbox) — horizontal</div>
        <ChoiceboxGroup type="checkbox" columns={2} defaultValue={["analytics"]}>
          <Choicebox value="analytics" icon="chart-bar" title="Web Analytics" description="Privacy-friendly traffic insights." />
          <Choicebox value="speed" icon="trend-up" title="Speed Insights" description="Real-world performance metrics." />
        </ChoiceboxGroup>
      </div>
      <div>
        <div className="lbl">Toggle (switch) — horizontal</div>
        <ChoiceboxGroup type="switch" columns={2} defaultValue={["firewall"]}>
          <Choicebox value="firewall" icon="shield" title="Firewall" description="Block malicious traffic automatically." />
          <Choicebox value="logs" icon="file" title="Audit Logs" description="Record every access event." />
        </ChoiceboxGroup>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
