<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  #root { display: flex; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { SidebarProvider, Sidebar, SidebarContent, SidebarGroup, SidebarGroupLabel, SidebarMenu, SidebarMenuItem, SidebarMenuButton, SidebarInset, ToggleGroup, ToggleGroupItem, Icon } = window.TestDesignSystem_be7089;
function App(){
  const [variant, setVariant] = React.useState("sidebar");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, width: "100%" }}>
      <ToggleGroup type="single" variant="outline" value={variant} onValueChange={(v) => { if (v) setVariant(v); }}>
        <ToggleGroupItem value="sidebar">Sidebar</ToggleGroupItem>
        <ToggleGroupItem value="floating">Floating</ToggleGroupItem>
        <ToggleGroupItem value="inset">Inset</ToggleGroupItem>
      </ToggleGroup>
      <SidebarProvider key={variant} style={{ height: 280, border: "1px solid var(--border)", borderRadius: 8, overflow: "hidden" }}>
        <Sidebar variant={variant} collapsible="none">
          <SidebarContent>
            <SidebarGroup>
              <SidebarGroupLabel>Platform</SidebarGroupLabel>
              <SidebarMenu>
                <SidebarMenuItem><SidebarMenuButton isActive><Icon name="home" /> Dashboard</SidebarMenuButton></SidebarMenuItem>
                <SidebarMenuItem><SidebarMenuButton><Icon name="inbox" /> Inbox</SidebarMenuButton></SidebarMenuItem>
                <SidebarMenuItem><SidebarMenuButton><Icon name="settings" /> Settings</SidebarMenuButton></SidebarMenuItem>
              </SidebarMenu>
            </SidebarGroup>
          </SidebarContent>
        </Sidebar>
        <SidebarInset><div style={{ padding: 12, color: "var(--muted-foreground)", fontSize: 13 }}>Page content</div></SidebarInset>
      </SidebarProvider>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
