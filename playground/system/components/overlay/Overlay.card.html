<!-- @dsCard group="Overlay" viewport="720x420" name="Overlay" subtitle="dimming scrim / backdrop — reusable" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .lbl { font-size: 12px; color: var(--muted-foreground); margin-bottom: 12px; }
  .stage { position: relative; height: 260px; border: 1px solid var(--border); border-radius: var(--radius-lg); background: color-mix(in oklch, var(--muted) 40%, transparent); overflow: hidden; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Overlay, Button } = window.TestDesignSystem_be7089;
function App(){
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ maxWidth: 560 }}>
      <div className="lbl">Click to toggle the scrim (fixed=false, fills the stage).</div>
      <div className="stage">
        <Button onClick={() => setOpen(true)}>Show overlay</Button>
        <Overlay open={open} fixed={false} onClick={() => setOpen(false)} />
        {open && <div style={{ position: "absolute", zIndex: 41, background: "var(--card)", border: "1px solid var(--border)", borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow-lg)", padding: 20, fontSize: 14 }}>Content above the scrim — click the scrim to dismiss.</div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
