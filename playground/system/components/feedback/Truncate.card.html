<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 40px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .lbl { font-size: 12px; color: var(--muted-foreground); margin-bottom: 12px; }
  .box { width: 220px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Truncate } = window.TestDesignSystem_be7089;
function App(){
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <div className="lbl">Cursor reveal (default) — follows the pointer, offset right.</div>
        <div className="box"><Truncate>Este texto es muy largo para leerlo completo</Truncate></div>
      </div>
      <div>
        <div className="lbl">Cover reveal — appears right over the original text.</div>
        <div className="box"><Truncate reveal="cover">Este texto es muy largo para leerlo completo</Truncate></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
