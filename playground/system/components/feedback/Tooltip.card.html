<!-- @dsCard group="Feedback" viewport="640x760" name="Tooltip" subtitle="label · shortcut · hint · rich — shown statically" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 32px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 16px; align-items: flex-start; max-width: 380px; }
  .sub { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--muted-foreground); margin: 12px 0 2px; }
  /* Static preview: render the real Tooltip in normal flow, no hover needed. */
  .flow .ds-tooltip { position: static !important; transform: none !important; animation: none; }
  .flow [role="tooltip"] { inset: auto !important; }
  .stack { max-width: 320px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Tooltip, TooltipContent, Button, Icon } = window.TestDesignSystem_be7089;

/* Real component, forced open for a hover-free preview. */
function Preview(props) {
  return <Tooltip defaultOpen><TooltipContent {...props} /></Tooltip>;
}

function App(){
  return (
    <div className="stack flow">
      <div className="sub">Compact (sm)</div>
      <Preview size="sm">Tooltip label</Preview>
      <Preview size="sm" shortcut="⌘+F">Tooltip label</Preview>

      <div className="sub">Default</div>
      <Preview>Tooltip label</Preview>
      <Preview shortcut="⌘+F">Tooltip label</Preview>
      <Preview hint="Hint or ⌘⌥⇧⌃">Tooltip label</Preview>

      <div className="sub">Rich</div>
      <Preview hint="Esta configuración será ignorada en los chats que tengan desactivado el sonido de forma individual." style={{ maxWidth: 320, whiteSpace: "normal", textAlign: "center" }}>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="check-circle" size={15} /> Haz click para activar el sonido</span>
      </Preview>
      <Preview hint="(Haz click para registrar)">Sin correo electrónico</Preview>
      <Preview hint="(Haz click para copiar)">
        <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}><Icon name="copy" size={15} /> +54 9 260 401 0976</span>
      </Preview>

      <div className="sub">Promo (feature spotlight)</div>
      <Preview media={<span />} hint="Hint ⌘⌥⇧⌃">Tooltip label</Preview>
      <Preview media={<span />} dismissible hint="Hint ⌘⌥⇧⌃">Tooltip label</Preview>

      <div className="sub">Card (description + actions)</div>
      <Preview media={<span />} dismissible description="Esta es una descripción corta y util para guiar al usuario con algo importante que aprender." footerLink="Conoce más aquí" action={<Button variant="ghost" size="sm">Entiendo</Button>}>Tooltip label</Preview>
      <Preview media={<span />} dismissible description="Esta es una descripción corta y util para guiar al usuario con algo importante que aprender." footerLink="Conoce más aquí" action={<Button variant="secondary" size="sm">Entiendo</Button>}>Tooltip label</Preview>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
