<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .h { font: var(--font-weight-medium) 11px/1 var(--font-mono); color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .05em; margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px 8px; margin-bottom: 20px; }
  .i { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--foreground); }
  .i span { font: 9px/1 var(--font-mono); color: var(--muted-foreground); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon } = window.TestDesignSystem_be7089;
const pictos = ["close","add","remove","back","forward","chevron-down","check","radio","menu","search","filter","sort","expand","collapse","upload","download","settings","edit","delete","more-horizontal"];
const product = ["customer","company","invoice","payment","project","task","calendar","message","workspace","crm","patient","doctor"];
const context = ["play","pause","stop","volume","mute","microphone","image","video","trend-up","trend-down","chart-bar","chart-line","chart-pie","mail","chat","notification","phone","pin","lock","shield"];
const Grid = ({ names }) => (
  <div className="grid">{names.map(n => <div className="i" key={n}><Icon name={n} size={20} /><span>{n}</span></div>)}</div>
);
function App() {
  return (
    <div>
      <p className="h">Pictos — system</p><Grid names={pictos} />
      <p className="h">Icons — product</p><Grid names={product} />
      <p className="h">Context — functional</p><Grid names={context} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
