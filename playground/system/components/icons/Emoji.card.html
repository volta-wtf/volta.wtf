<!DOCTYPE html>

<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .h { font: var(--font-weight-medium) 11px/1 var(--font-mono); color: var(--muted-foreground); text-transform: uppercase; letter-spacing: .05em; margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 10px 6px; margin-bottom: 18px; }
  .i { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Emoji } = window.TestDesignSystem_be7089;
const { EmojiCategories } = window.TestDesignSystem_be7089;
function App() {
  return (
    <div>
      {Object.entries(EmojiCategories).map(([cat, list]) => (
        <div key={cat}>
          <p className="h">{cat}</p>
          <div className="grid">
            {list.map((e) => <div className="i" key={e.name}><Emoji name={e.name} size={22} label={e.name} /></div>)}
          </div>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
