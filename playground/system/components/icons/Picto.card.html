<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 40px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
  .h { font: 700 12px/1.2 var(--font-sans); letter-spacing: -0.01em; display: flex; align-items: center; align-self: stretch; height: 100%; padding: 0 12px; background: var(--foreground); color: var(--background); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .i { display: flex; align-items: center; gap: 8px; color: var(--foreground); min-width: 0; padding: 0 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .i span { font: 11px/1.2 var(--font-mono); color: var(--muted-foreground); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Picto, PictoCategories } = window.TestDesignSystem_be7089;
function App() {
  return (
    <div className="grid">
      {Object.entries(PictoCategories).map(([cat, glyphs]) => (
        <React.Fragment key={cat}>
          <p className="h">{cat}</p>
          {Object.keys(glyphs).map((n) => (
            <div className="i" key={n}><Picto name={n} size={18} /><span>{n}</span></div>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
