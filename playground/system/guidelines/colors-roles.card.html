<!-- @dsCard group="1.1 · Colors" viewport="700x150" name="Role · Primary & Neutral" subtitle="Core role tokens" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--background); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 96px; height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font: var(--font-weight-medium) var(--text-xs)/1.2 var(--font-sans); color: var(--foreground); }
  .val { font: var(--font-weight-normal) 11px/1.2 var(--font-mono); color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><span class="name">primary</span><span class="val">0.205 0 0</span></div>
    <div class="sw"><div class="chip" style="background:var(--secondary)"></div><span class="name">secondary</span><span class="val">0.97 0 0</span></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><span class="name">muted</span><span class="val">0.97 0 0</span></div>
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><span class="name">accent</span><span class="val">0.97 0 0</span></div>
    <div class="sw"><div class="chip" style="background:var(--foreground)"></div><span class="name">foreground</span><span class="val">0.145 0 0</span></div>
    <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><span class="name">muted-fg</span><span class="val">0.556 0 0</span></div>
  </div>
</body>
</html>
