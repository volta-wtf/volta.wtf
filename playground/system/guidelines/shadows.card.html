<!-- @dsCard group="1.3 · Spacing & Elevation" viewport="700x160" name="Shadows" subtitle="Elevation xs → xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .row { display: flex; gap: 22px; align-items: center; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 72px; height: 56px; background: var(--card); border-radius: var(--radius-md); }
  .n { font: var(--font-weight-normal) 10px/1 var(--font-mono); color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
    <div class="c"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
  </div>
</body>
</html>
