<!-- @dsCard group="1.1 · Colors" viewport="700x150" name="Surfaces & Lines" subtitle="Background, card, popover, border, input, ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--background); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 96px; height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font: var(--font-weight-medium) var(--text-xs)/1.2 var(--font-sans); color: var(--foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--background)"></div><span class="name">background</span></div>
    <div class="sw"><div class="chip" style="background:var(--card)"></div><span class="name">card</span></div>
    <div class="sw"><div class="chip" style="background:var(--popover)"></div><span class="name">popover</span></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><span class="name">border</span></div>
    <div class="sw"><div class="chip" style="background:var(--input)"></div><span class="name">input</span></div>
    <div class="sw"><div class="chip" style="background:var(--ring)"></div><span class="name">ring</span></div>
  </div>
</body>
</html>
