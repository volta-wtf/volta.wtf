<!-- @dsCard group="1.3 · Spacing & Elevation" viewport="700x160" name="Spacing Scale" subtitle="4px base · space-1 → space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .c { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--primary); border-radius: 3px; width: 20px; }
  .n { font: var(--font-weight-normal) 10px/1 var(--font-mono); color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="height:var(--spacing-1)"></div><span class="n">1·4</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-2)"></div><span class="n">2·8</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-3)"></div><span class="n">3·12</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-4)"></div><span class="n">4·16</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-6)"></div><span class="n">6·24</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-8)"></div><span class="n">8·32</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-10)"></div><span class="n">10·40</span></div>
    <div class="c"><div class="bar" style="height:var(--spacing-12)"></div><span class="n">12·48</span></div>
  </div>
</body>
</html>
