<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="Warm-neutral oklch, hue ~80, chroma ≤ 0.005" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--background); }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; padding: 16px; }
  .cell { display: flex; flex-direction: column; gap: 5px; }
  .sw { height: 64px; border-radius: var(--radius-sm); box-shadow: inset 0 0 0 1px oklch(0 0 0 / 0.06); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted-foreground); text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="sw" style="background: var(--neutral-50)"></div><span class="lbl">50</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-100)"></div><span class="lbl">100</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-200)"></div><span class="lbl">200</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-300)"></div><span class="lbl">300</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-400)"></div><span class="lbl">400</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-500)"></div><span class="lbl">500</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-600)"></div><span class="lbl">600</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-700)"></div><span class="lbl">700</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-800)"></div><span class="lbl">800</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-900)"></div><span class="lbl">900</span></div>
  <div class="cell"><div class="sw" style="background: var(--neutral-950)"></div><span class="lbl">950</span></div>
</div>
</body>
</html>
