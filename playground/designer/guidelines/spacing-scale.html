<!-- @dsCard group="Spacing" viewport="700x190" name="Scale — 4px base" subtitle="2·4·6·8·12·16·24·32; el chrome vive en 2–12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--background); }
  .rows { padding: 12px 16px; display: flex; flex-direction: column; gap: 7px; }
  .r { display: grid; grid-template-columns: 96px 1fr; gap: 12px; align-items: center; }
  .m { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
  .bar { height: 12px; border-radius: 3px; background: var(--selection-muted); border: 1px solid var(--selection); border-left-width: 1px; }
</style>
</head>
<body>
<div class="rows">
  <div class="r"><span class="m">space-0-5 · 2px</span><div class="bar" style="width: 2px"></div></div>
  <div class="r"><span class="m">space-1 · 4px</span><div class="bar" style="width: 4px"></div></div>
  <div class="r"><span class="m">space-1-5 · 6px</span><div class="bar" style="width: 6px"></div></div>
  <div class="r"><span class="m">space-2 · 8px</span><div class="bar" style="width: 8px"></div></div>
  <div class="r"><span class="m">space-3 · 12px</span><div class="bar" style="width: 12px"></div></div>
  <div class="r"><span class="m">space-4 · 16px</span><div class="bar" style="width: 16px"></div></div>
  <div class="r"><span class="m">space-6 · 24px</span><div class="bar" style="width: 24px"></div></div>
  <div class="r"><span class="m">space-8 · 32px</span><div class="bar" style="width: 32px"></div></div>
</div>
</body>
</html>
