<!-- @dsCard group="Effects" viewport="700x170" name="Shadows — earned depth" subtitle="Chrome plano; sombra solo al flotar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--canvas); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; padding: 20px; }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 100%; height: 60px; background: var(--card); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .m { font-family: var(--font-mono); font-size: 9.5px; color: var(--muted-foreground); }
</style>
</head>
<body>
<div class="row">
  <div class="cell"><div class="box"></div><span class="m">flat · border-first</span></div>
  <div class="cell"><div class="box" style="box-shadow: var(--shadow-sm)"></div><span class="m">sm · cards</span></div>
  <div class="cell"><div class="box" style="box-shadow: var(--shadow-popover); border: none"></div><span class="m">popover · menus</span></div>
  <div class="cell"><div class="box" style="box-shadow: var(--shadow-lg); border: none"></div><span class="m">lg · dialogs</span></div>
  <div class="cell"><div class="box" style="box-shadow: var(--shadow-drag); border: none; transform: rotate(-2deg)"></div><span class="m">drag · layer en vuelo</span></div>
</div>
</body>
</html>
