<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--background); }
  .stack { padding: 14px 20px; display: flex; flex-direction: column; gap: 6px; }
  .l { display: flex; align-items: baseline; gap: 14px; white-space: nowrap; overflow: hidden; }
  .m { flex: none; width: 70px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
</style>
</head>
<body>
<div class="stack">
  <div class="l"><span class="m">48 serif</span><span style="font-family: var(--font-serif); font-size: var(--text-5xl); letter-spacing: var(--tracking-tighter); line-height: 1.05">Design at 60fps</span></div>
  <div class="l"><span class="m">30 sans</span><span style="font-size: var(--text-3xl); font-weight: var(--font-weight-semibold); letter-spacing: var(--tracking-tight)">Layers without limits</span></div>
  <div class="l"><span class="m">20 sans</span><span style="font-size: var(--text-xl); color: var(--muted-foreground)">Composable, performant, developer-friendly.</span></div>
  <div class="l"><span class="m">16 body</span><span style="font-size: var(--text-base)">Bind a layer to a field and let real content drive the layout.</span></div>
</div>
</body>
</html>
