<!-- @dsCard group="Effects" viewport="700x170" name="Motion — instant, mechanical" subtitle="80–240ms; hover para ver cada easing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--background); }
  .rows { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .r { display: grid; grid-template-columns: 190px 1fr; gap: 14px; align-items: center; }
  .m { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
  .track { position: relative; height: 22px; border-radius: var(--radius-full); background: var(--muted); }
  .dot { position: absolute; left: 3px; top: 3px; width: 16px; height: 16px; border-radius: 999px; background: var(--foreground); }
  .rows:hover .d1 { transition: left var(--duration-fast) var(--ease-standard); left: calc(100% - 19px); }
  .rows:hover .d2 { transition: left var(--duration) var(--ease-standard); left: calc(100% - 19px); }
  .rows:hover .d3 { transition: left var(--duration-slow) var(--ease-out); left: calc(100% - 19px); }
  .rows:hover .d4 { transition: left var(--duration-slow) var(--ease-in); left: calc(100% - 19px); }
</style>
</head>
<body>
<div class="rows">
  <div class="r"><span class="m">fast 120ms · ease-standard</span><div class="track"><div class="dot d1"></div></div></div>
  <div class="r"><span class="m">default 160ms · ease-standard</span><div class="track"><div class="dot d2"></div></div></div>
  <div class="r"><span class="m">slow 240ms · ease-out (entra)</span><div class="track"><div class="dot d3"></div></div></div>
  <div class="r"><span class="m">slow 240ms · ease-in (sale)</span><div class="track"><div class="dot d4"></div></div></div>
</div>
</body>
</html>
