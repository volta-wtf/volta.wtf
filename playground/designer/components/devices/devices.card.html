<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--background); margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DeviceFrame, BreakpointSwitcher } = window.DesignerDesignSystem_6adbd8;

function Screen({ pad = 24, scale = 1 }) {
  const s = (n) => n * scale;
  return (
    <div style={{ padding: s(pad), display: 'flex', flexDirection: 'column', gap: s(12) }}>
      <div style={{ height: s(28), width: '55%', borderRadius: s(6), background: 'var(--muted)' }}></div>
      <div style={{ height: s(12), width: '85%', borderRadius: s(4), background: 'var(--muted)' }}></div>
      <div style={{ height: s(12), width: '70%', borderRadius: s(4), background: 'var(--muted)' }}></div>
      <div style={{ flex: 'none', height: s(120), borderRadius: s(8), background: 'var(--canvas)', border: '1px solid var(--border)' }}></div>
      <div style={{ height: s(32), width: s(120), borderRadius: s(6), background: 'var(--primary)' }}></div>
    </div>
  );
}

function DevicesCard() {
  const [bp, setBp] = React.useState('laptop');
  return (
    <div style={{ padding: '10px 16px', display: 'flex', flexDirection: 'column', gap: 4 }}>
      <div style={{ display: 'flex', justifyContent: 'center' }}>
        <BreakpointSwitcher value={bp} onChange={setBp} />
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center', gap: 24 }}>
        <DeviceFrame device="phone" scale={0.26} label="Phone · 390×844"><Screen /></DeviceFrame>
        <DeviceFrame device="tablet" scale={0.24} label="Tablet · 768×1024"><Screen pad={40} scale={1.4} /></DeviceFrame>
        <DeviceFrame device="laptop" scale={0.19} url="acme.studio" label="Laptop · 1280×832"><Screen pad={64} scale={2.2} /></DeviceFrame>
        <DeviceFrame device="watch" scale={0.6} label="Watch · 184×224"><Screen pad={16} scale={0.5} /></DeviceFrame>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<DevicesCard />);
</script>
</body>
</html>
