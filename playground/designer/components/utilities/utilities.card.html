<!-- @dsCard group="Components" viewport="700x380" name="Micro-tools" subtitle="GradientEditor · FilterStack · ShapeLibrary — plugins as data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--background); margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { GradientEditor, FilterStack, ShapeLibrary, Label } = window.DesignerDesignSystem_6adbd8;

function UtilitiesCard() {
  const [gradients, setGradients] = React.useState([]);
  const [filters, setFilters] = React.useState([]);
  const [shapes, setShapes] = React.useState([]);
  React.useEffect(() => {
    fetch('../../data/gradients.json').then(r => r.json()).then(d => setGradients(d.presets)).catch(() => null);
    fetch('../../data/filters.json').then(r => r.json()).then(d => setFilters(d.presets.slice(0, 4))).catch(() => null);
    fetch('../../data/shapes.json').then(r => r.json()).then(d => setShapes(d.shapes.slice(0, 7))).catch(() => null);
  }, []);
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr', gap: 16, padding: '14px 16px' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <Label eyebrow>Gradient</Label>
        <GradientEditor presets={gradients} />
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <Label eyebrow>Filters</Label>
        <FilterStack presets={filters} />
        <div style={{ margin: '0 calc(-1 * var(--space-2))' }}>
          <ShapeLibrary shapes={shapes} title="Shapes" />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<UtilitiesCard />);
</script>
</body>
</html>
