<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--background); margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon, ICON_ROLE_GROUPS } = window.DesignerDesignSystem_6adbd8;

function IconCard() {
  return (
    <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
      {Object.entries(ICON_ROLE_GROUPS).map(([group, roles]) => (
        <div key={group} style={{ display: 'grid', gridTemplateColumns: '86px 1fr', gap: 12, alignItems: 'start' }}>
          <div style={{
            fontSize: 'var(--text-ui-xs)', letterSpacing: 'var(--tracking-widest)',
            textTransform: 'uppercase', color: 'var(--muted-foreground)',
            fontWeight: 'var(--font-weight-medium)', paddingTop: 3,
          }}>{group}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 2 }}>
            {Object.keys(roles).map((role) => (
              <span key={role} title={role} style={{
                width: 24, height: 24, display: 'inline-flex', alignItems: 'center',
                justifyContent: 'center', borderRadius: 'var(--radius-xs)',
                color: 'var(--foreground)',
              }}>
                <Icon name={role} size={16} />
              </span>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IconCard />);
</script>
</body>
</html>
