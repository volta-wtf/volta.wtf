<body>
<div id="root"></div>
<script type="text/babel">
const { CommandPalette, ShortcutsOverlay } = window.DesignerDesignSystem_6adbd8;

const FALLBACK = { groups: [
  { id: 'tools', name: 'Tools', commands: [
    { id: 't1', title: 'Select', icon: 'select', keys: ['V'] },
    { id: 't2', title: 'Frame', icon: 'frame', keys: ['F'] },
  ]},
]};

function CommandsCard() {
  const [kb, setKb] = React.useState(FALLBACK);
  React.useEffect(() => {
    fetch('../../data/keybindings.json').then(r => r.json()).then(setKb).catch(() => null);
  }, []);
  return (
    <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
      <ShortcutsOverlay groups={kb.groups.slice(0, 3)} style={{ opacity: 0.4, filter: 'blur(0.5px)' }} />
      <CommandPalette groups={kb.groups} open onClose={() => {}} onRun={() => {}} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<CommandsCard />);
</script>
