<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--background); margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ActionFill, ActionRotate, ActionOpacity, Label } = window.DesignerDesignSystem_6adbd8;

function ActionsCard() {
  const [fill, setFill] = React.useState('#d97757');
  const [alpha, setAlpha] = React.useState(100);
  const [rot, setRot] = React.useState(0);
  const [op, setOp] = React.useState(80);
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px 24px', padding: '14px 16px', maxWidth: 620, alignItems: 'start' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <Label eyebrow>Fill</Label>
        <ActionFill value={fill} onChange={setFill} alpha={alpha} onAlphaChange={setAlpha} />
        <Label eyebrow style={{ marginTop: 8 }}>Preview</Label>
        <div style={{ height: 44, borderRadius: 8, border: '1px solid var(--border)', background: fill, opacity: (alpha / 100) * (op / 100), transform: `rotate(${rot}deg)`, transition: 'transform var(--duration) var(--ease-standard)' }}></div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        <Label eyebrow>Rotate</Label>
        <ActionRotate value={rot} onChange={setRot} onFlipH={() => setRot(-rot)} onFlipV={() => setRot(180 - rot)} />
        <Label eyebrow style={{ marginTop: 8 }}>Opacity</Label>
        <ActionOpacity value={op} onChange={setOp} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ActionsCard />);
</script>
</body>
</html>
