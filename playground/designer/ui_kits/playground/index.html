<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Designer — Playground</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--background); display: flex; overflow: hidden; }
  nav {
    width: 216px; flex: none; border-right: 1px solid var(--border);
    padding: 16px 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px;
  }
  nav .wordmark { font-weight: var(--font-weight-semibold); font-size: var(--text-ui-lg); padding: 0 10px 10px; letter-spacing: var(--tracking-tight); }
  nav .eyebrow { font-size: var(--text-ui-xs); text-transform: uppercase; letter-spacing: var(--tracking-widest); color: var(--muted-foreground); font-weight: var(--font-weight-medium); padding: 12px 10px 4px; }
  nav a {
    display: block; padding: 5px 10px; border-radius: var(--radius-sm);
    font-size: var(--text-ui); color: var(--foreground); text-decoration: none;
  }
  nav a:hover { background: var(--muted); }
  main { flex: 1; min-width: 0; overflow-y: auto; padding: 20px 24px 60px; }
  .sec { margin-bottom: 28px; }
  .sec h2 { font-size: var(--text-ui-xs); text-transform: uppercase; letter-spacing: var(--tracking-widest); color: var(--muted-foreground); font-weight: var(--font-weight-medium); margin: 0 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 14px; }
  .spec { border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: var(--card); }
  .spec header { display: flex; align-items: center; justify-content: space-between; padding: 7px 11px; border-bottom: 1px solid var(--border); }
  .spec header span { font-size: var(--text-ui-sm); font-weight: var(--font-weight-medium); }
  .spec header a { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); text-decoration: none; }
  .spec header a:hover { color: var(--foreground); }
  .spec iframe { display: block; width: 100%; border: none; background: var(--background); }
</style>
</head>
<body>
<nav>
  <div class="wordmark">Designer</div>
  <div class="eyebrow">Playground</div>
  <a href="#fundamentos">Fundamentos</a>
  <a href="#componentes">Componentes</a>
  <a href="#editor">Editor</a>
  <div class="eyebrow">Abrir</div>
  <a href="../editor/index.html">Editor completo →</a>
  <a href="../../index.html">Index del sistema →</a>
  <a href="../../readme.md">readme.md →</a>
</nav>
<main>
  <section class="sec" id="fundamentos">
    <h2>Fundamentos</h2>
    <div class="grid" id="g-found"></div>
  </section>
  <section class="sec" id="componentes">
    <h2>Componentes</h2>
    <div class="grid" id="g-comp"></div>
  </section>
  <section class="sec" id="editor">
    <h2>Editor</h2>
    <div class="grid" style="grid-template-columns: 1fr" id="g-editor"></div>
  </section>
</main>
<script>
  var FOUND = [
    ['Neutral ramp', '../../guidelines/colors-neutral.html', 170],
    ['Semantic surfaces', '../../guidelines/colors-semantic.html', 200],
    ['Accents', '../../guidelines/colors-accents.html', 170],
    ['Families', '../../guidelines/type-families.html', 210],
    ['UI scale', '../../guidelines/type-ui-scale.html', 200],
    ['Content scale', '../../guidelines/type-content-scale.html', 250],
    ['Spacing', '../../guidelines/spacing-scale.html', 210],
    ['Chrome dimensions', '../../guidelines/spacing-chrome.html', 190],
    ['Radius', '../../guidelines/radius.html', 180],
    ['Shadows', '../../guidelines/shadows.html', 190],
    ['Motion', '../../guidelines/motion.html', 190],
    ['Token tiers', '../../guidelines/token-tiers.html', 240],
    ['Canvas & selection', '../../guidelines/canvas-selection.html', 220],
  ];
  var COMP = [
    ['Icon library', '../../components/icons/icons.card.html', 450],
    ['UI primitives', '../../components/ui/ui.card.html', 420],
    ['Typed fields', '../../components/fields/fields.card.html', 320],
    ['Editor chrome', '../../components/designer/designer.card.html', 450],
    ['Token manager', '../../components/tokens/tokens-ui.card.html', 380],
    ['Data collections', '../../components/data/data.card.html', 420],
    ['Asset library', '../../components/library/library.card.html', 320],
    ['Micro-tools', '../../components/utilities/utilities.card.html', 400],
    ['Device previews', '../../components/devices/devices.card.html', 360],
    ['Prototyping', '../../components/prototype/prototype.card.html', 360],
    ['Commands', '../../components/commands/commands.card.html', 400],
    ['Actions', '../../components/actions/actions.card.html', 260],
    ['Collaboration', '../../components/collab/collab.card.html', 280],
  ];
  function fill(id, list) {
    var g = document.getElementById(id);
    list.forEach(function (it) {
      var d = document.createElement('div');
      d.className = 'spec';
      d.innerHTML = '<header><span></span><a target="_blank">abrir ↗</a></header>';
      d.querySelector('span').textContent = it[0];
      var a = d.querySelector('a'); a.href = it[1];
      var f = document.createElement('iframe');
      f.src = it[1]; f.loading = 'lazy'; f.height = it[2]; f.title = it[0];
      d.appendChild(f);
      g.appendChild(d);
    });
  }
  fill('g-found', FOUND);
  fill('g-comp', COMP);
  fill('g-editor', [['Editor — multi-archetype', '../editor/index.html', 620]]);
</script>
</body>
</html>
